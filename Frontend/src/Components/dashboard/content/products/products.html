

<div class="productPage">

  @if (canManage()) {
    <div class="manageBar">
      <span class="productCount">{{ products().length }} products</span>
      <button class="addBtn" (click)="openAddModal()">+ Add Product</button>
    </div>
  }

  @if (loading()) {
  <div class="loadingState">Loading products...</div>
  } @else if (products().length === 0) {
    <div class="emptyState">No products found.</div>
  } @else {
    <div class="productList">
      @for (product of products(); track product.id) {
        <app-product-card
          [product]="product"
          [canManage]="canManage()"
          (onEdit)="openEditModal($event)"
          (onDelete)="deleteProduct($event)">
        </app-product-card>
      }
    </div>
  }

  @if (showModal) {
    <div class="modalOverlay" (click)="closeModal()">
      <div class="modal" (click)="$event.stopPropagation()">
        <h3 class="modalTitle">{{ editingProduct ? 'Edit Product' : 'Add Product' }}</h3>

        <div class="formGroup">
          <label>Name</label>
          <input [(ngModel)]="modalForm.name" placeholder="Product name" />
        </div>
        <div class="formGroup">
          <label>Price</label>
          <input [(ngModel)]="modalForm.unitPrice" type="number" placeholder="0.00" />
        </div>
        <div class="formGroup">
          <label>Category ID</label>
          <input [(ngModel)]="modalForm.categoryId" type="number" placeholder="Category ID" />
        </div>
        <div class="formGroup">
          <label>SKU</label>
          <input [(ngModel)]="modalForm.sku" type="number" placeholder="SKU number" />
        </div>

        <div class="modalActions">
          <button class="cancelBtn" (click)="closeModal()">Cancel</button>
          <button class="saveBtn" (click)="saveProduct()">
            {{ editingProduct ? 'Save Changes' : 'Add Product' }}
          </button>
        </div>
      </div>
    </div>
  }

</div>
