

<div class="storeList">
  @if (loading()) {
    <p class="loadingText">Loading stores...</p>
  } @else {
    @for (store of stores(); track store.id) {
      <app-shop-card
        [store]="store"
        [isAdmin]="isAdmin"
        (onDelete)="deleteStore($event)"
      ></app-shop-card>
    }
  }
</div>
